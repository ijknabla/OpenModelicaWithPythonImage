# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
        exclude: /ui/.*\.py$
    -   id: check-yaml
    -   id: check-added-large-files
-   repo: local
    hooks:
    -   id: ruff-check
        name: Check python code by ruff (https://docs.astral.sh/ruff/rules/)
        entry: ruff
        args:
        -   check
        -   --fix
        language: system
        files: \.pyi?$
        exclude: /ui/.*\.py$
    -   id: ruff-format
        name: Format python code by ruff
        entry: ruff
        args:
        -   format
        language: system
        files: \.pyi?$
        exclude: /ui/.*\.py$
    -   id: poetry-mypy
        name: Check python code by mypy
        entry: poetry
        args:
        -   run
        -   mypy
        -   --strict
        -   .
        language: system
        pass_filenames: false
    -   id: uic
        name: Generate python code by uic
        entry: python
        args:
        -   .pre-commit/uic.py
        -   --input-dir=src/ui/
        -   --output-dir=omcpyimage/ui
        language: system
        files: ^src/ui/.*\.ui$
